<!-- ============================================================
     DYNAMIC SEO FOR MULTILINGUAL PAGES
     Updates meta tags based on ?lang= parameter for better SEO
     ============================================================ -->
<script>
(async function() {
  // Get language from URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  const lang = urlParams.get('lang') || 'en';
  
  // Only update if not English (default tags are English)
  if (lang === 'en') return;
  
  try {
    // Fetch SEO translations
    const response = await fetch('data/seo-translations.json');
    const translations = await response.json();
    
    if (!translations[lang]) {
      console.warn(`SEO translations not found for language: ${lang}`);
      return;
    }
    
    const seo = translations[lang];
    
    // Update page title
    if (seo.meta_title) {
      document.title = seo.meta_title;
    }
    
    // Update meta description
    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc && seo.meta_description) {
      metaDesc.setAttribute('content', seo.meta_description);
    }
    
    // Update Open Graph title
    const ogTitle = document.querySelector('meta[property="og:title"]');
    if (ogTitle && seo.og_title) {
      ogTitle.setAttribute('content', seo.og_title);
    }
    
    // Update Open Graph description
    const ogDesc = document.querySelector('meta[property="og:description"]');
    if (ogDesc && seo.og_description) {
      ogDesc.setAttribute('content', seo.og_description);
    }
    
    // Update Twitter title
    const twitterTitle = document.querySelector('meta[name="twitter:title"]');
    if (twitterTitle && seo.og_title) {
      twitterTitle.setAttribute('content', seo.og_title);
    }
    
    // Update Twitter description
    const twitterDesc = document.querySelector('meta[name="twitter:description"]');
    if (twitterDesc && seo.og_description) {
      twitterDesc.setAttribute('content', seo.og_description);
    }
    
    // Update canonical URL to include language parameter
    const canonical = document.querySelector('link[rel="canonical"]');
    if (canonical) {
      canonical.setAttribute('href', `https://pushpendradwivedi.github.io/aisentia/?lang=${lang}`);
    }
    
    // Update Open Graph URL
    const ogUrl = document.querySelector('meta[property="og:url"]');
    if (ogUrl) {
      ogUrl.setAttribute('content', `https://pushpendradwivedi.github.io/aisentia/?lang=${lang}`);
    }
    
    // Update html lang attribute for accessibility and SEO
    document.documentElement.setAttribute('lang', lang);
    
    // Set RTL direction for Arabic and Urdu
    if (lang === 'ar' || lang === 'ur') {
      document.documentElement.setAttribute('dir', 'rtl');
    }
    
    console.log(`✅ SEO meta tags updated for language: ${lang}`);
  } catch (error) {
    console.error('Failed to load SEO translations:', error);
  }
})();
</script>

<!-- Core Web Vitals Tracking (Google's official performance metrics for SEO) -->
<script type="module">
import {onCLS, onINP, onLCP} from 'https://unpkg.com/web-vitals@4?module';

// Track Cumulative Layout Shift (visual stability)
// Good: < 0.1 | Needs Improvement: 0.1-0.25 | Poor: > 0.25
onCLS(metric => {
  gtag('event', 'web_vitals', {
    event_category: 'Web Vitals',
    event_label: 'CLS',
    value: Math.round(metric.value * 1000), // CLS is decimal, multiply for GA4
    non_interaction: true
  });
});

// Track Interaction to Next Paint (responsiveness) - replaces FID as of March 2024
// Good: < 200ms | Needs Improvement: 200-500ms | Poor: > 500ms
onINP(metric => {
  gtag('event', 'web_vitals', {
    event_category: 'Web Vitals',
    event_label: 'INP',
    value: Math.round(metric.value),
    non_interaction: true
  });
});

// Track Largest Contentful Paint (loading speed)
// Good: < 2.5s | Needs Improvement: 2.5-4s | Poor: > 4s
onLCP(metric => {
  gtag('event', 'web_vitals', {
    event_category: 'Web Vitals',
    event_label: 'LCP',
    value: Math.round(metric.value),
    non_interaction: true
  });
});
</script>

      { code: 'vi', name: 'Vietnamese', native: 'Tiếng Việt' },
      { code: 'ko', name: 'Korean', native: '한국어' },
      { code: 'ta', name: 'Tamil', native: 'தமிழ்' },
      { code: 'ms', name: 'Malay', native: 'Bahasa Melayu' },
      { code: 'th', name: 'Thai', native: 'ไทย' },
      { code: 'pl', name: 'Polish', native: 'Polski' }
    ],
    uiTranslations: {},  // All UI translations (loaded once)
    uiText: {},          // Current language UI text

    // ── BANNER CAROUSEL STATE ───────────────────────────────────────────────────
    currentBanner: 0,
    totalBanners: 3,
    bannerInterval: null,

    // ── SCROLL STATE ─────────────────────────────────────────────────────────────
    showScrollTop: false,

    // ── MULTI-SELECT FILTER STATE ────────────────────────────────────────────────
    selectedPersonas: [],
    selectedIndustries: [],
    selectedCompanies: [],
    selectedTitles: [],
    selectedLocations: [],

    // ── AVAILABLE OPTIONS (populated from data, grows automatically) ─────────────
    availableIndustries: [],
    availableCompanies: [],
    availableTitles: [],
    availableLocations: [],

    // ── DROPDOWN UI STATE ────────────────────────────────────────────────────────
    openDropdown: null,
    dropdownSearchPersona: '',
    dropdownSearchIndustry: '',
    dropdownSearchCompany: '',
    dropdownSearchTitle: '',
    dropdownSearchLocation: '',

    async init() {
      // Load UI translations (once, cached by browser)
      try {
        const response = await fetch('./data/ui-translations.json');
        this.uiTranslations = await response.json();
        this.uiText = this.uiTranslations[this.currentLanguage.code] || this.uiTranslations['en'];
      } catch (e) {
        console.warn('Could not load UI translations:', e);
        // Fallback to English placeholders
        this.uiText = this.uiTranslations['en'] || {};
      }
      
      this.loadPreferences();
      await this.fetchData();
      this.extractAvailableFilters();
      this.startBannerRotation();
      this.initScrollListener();
      
      // Track page view with language
      if (typeof window.trackKV === 'function') {
        window.trackKV('page_view_language', `index_${this.currentLanguage.code}`);
      }
    },

    // ── SCROLL METHODS ────────────────────────────────────────────────────────────
    initScrollListener() {
      window.addEventListener('scroll', () => {
        this.showScrollTop = window.scrollY > 300;
      });
    },

    scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      // Track event
      if (typeof gtag !== 'undefined') {
        gtag('event', 'scroll_to_top', { 
          page: 'dashboard',
          scroll_position: window.scrollY 
        });
      }
      if (typeof window.clarity === 'function') {
        window.clarity('event', 'scroll_to_top');
      }
      if (typeof window.trackKV === 'function') {
        window.trackKV('scroll_to_top', window.scrollY);
      }
    },

    // ── BANNER CAROUSEL METHODS ───────────────────────────────────────────────────
    startBannerRotation() {
      this.bannerInterval = setInterval(() => {
        this.currentBanner = (this.currentBanner + 1) % this.totalBanners;
      }, 5000); // Rotate every 5 seconds
    },

    stopBannerRotation() {
      if (this.bannerInterval) {
        clearInterval(this.bannerInterval);
        this.bannerInterval = null;
      }
    },

    goToBanner(index) {
      this.currentBanner = index;
      this.stopBannerRotation();
      this.startBannerRotation(); // Restart rotation after manual selection
    },

    // ── LOCALSTORAGE PERSISTENCE ─────────────────────────────────────────────────
    loadPreferences() {
      try {
        const saved = localStorage.getItem('aiSentiaFilters');
        if (saved) {
          const prefs = JSON.parse(saved);
          this.selectedPersonas   = prefs.personas   || [];
          this.selectedIndustries = prefs.industries  || [];
          this.selectedCompanies  = prefs.companies   || [];
          this.selectedTitles     = prefs.titles      || [];
          this.selectedLocations  = prefs.locations   || [];
          this.timeframe          = prefs.timeframe   || '24';
          // DEV ONLY: Load language preference
          if (prefs.language) {
            const savedLang = this.availableLanguages.find(l => l.code === prefs.language);
            if (savedLang) this.currentLanguage = savedLang;
          }
        }
      } catch (e) { console.warn('Could not load preferences:', e); }
    },

    savePreferences() {
      try {
        localStorage.setItem('aiSentiaFilters', JSON.stringify({
          personas:   this.selectedPersonas,
          industries: this.selectedIndustries,
          companies:  this.selectedCompanies,
          titles:     this.selectedTitles,
          locations:  this.selectedLocations,
          timeframe:  this.timeframe,
          language:   this.currentLanguage.code  // DEV ONLY: Save language
        }));
      } catch (e) { console.warn('Could not save preferences:', e); }
    },
    
    // ── DEV ONLY: LANGUAGE SWITCHING ─────────────────────────────────────────────
    async switchLanguage(langCode) {
      const newLang = this.availableLanguages.find(l => l.code === langCode);
      if (!newLang || newLang.code === this.currentLanguage.code) {
        this.languageDropdownOpen = false;
        return;
      }
      
      this.currentLanguage = newLang;
      this.languageDropdownOpen = false;
      this.savePreferences();
      
      // Update UI text in new language
      this.uiText = this.uiTranslations[langCode] || this.uiTranslations['en'] || {};
      
      // Track language change
      if (typeof gtag !== 'undefined')
        gtag('event', 'language_switch', { language: langCode, page_location: window.location.href });
      if (typeof window.clarity === 'function') {
        window.clarity('event', 'language_switch');
        window.clarity('set', 'language', langCode);
      }
      if (typeof window.trackKV === 'function') window.trackKV('language_switch', langCode);
      
      // Reload data in new language
      await this.fetchData();
      this.extractAvailableFilters();
    },

    resetAllFilters() {
      this.selectedPersonas   = [];
      this.selectedIndustries = [];
      this.selectedCompanies  = [];
      this.selectedTitles     = [];
      this.selectedLocations  = [];
      this.timeframe          = '24';
      this.search             = '';
      this.openDropdown       = null;
      this.savePreferences();
    },

    // ── DATA FETCHING (DEV ONLY: Language-aware) ─────────────────────────────────
    async fetchData() {
      this.loading = true;
      try {
        const isProd = ['pushpendradwivedi.github.io', 'aisentia.pages.dev', 'ai-sentia.pages.dev']
                         .includes(window.location.hostname);
        
        // DEV ONLY: Determine database file based on language
        let dbFile;
        if (this.currentLanguage.code === 'en') {
          // English: use base file
          dbFile = isProd ? './data/database.json' : './data/dev_database.json';
        } else {
          // Other languages: use language-suffixed file
          const langSuffix = '_' + this.currentLanguage.code;
          dbFile = isProd 
            ? `./data/database${langSuffix}.json` 
            : `./data/dev_database${langSuffix}.json`;
        }
        
        const res = await fetch(`${dbFile}?v=${Date.now()}`);
        if (res.ok) {
          const data = await res.json();
          this.allItems    = data.items       || [];
          this.refreshedAt = data.refreshed_at || 'Syncing...';
        } else if (res.status === 404 && this.currentLanguage.code !== 'en') {
          // DEV ONLY: Fallback to English if translation not found
          console.warn(`Translation file not found for ${this.currentLanguage.code}, falling back to English`);
          this.currentLanguage = this.availableLanguages.find(l => l.code === 'en');
          const fallbackFile = isProd ? './data/database.json' : './data/dev_database.json';
          const fallbackRes = await fetch(`${fallbackFile}?v=${Date.now()}`);
          if (fallbackRes.ok) {
            const data = await fallbackRes.json();
            this.allItems    = data.items       || [];
            this.refreshedAt = data.refreshed_at || 'Syncing...';
          }
        }
      } catch (e) {
        console.error("Database fetch error:", e);
        this.refreshedAt = 'Offline';
      }
      this.loading = false;
    },

    // ── EXTRACT FILTER OPTIONS ───────────────────────────────────────────────────
    // Runs once after data loads. Grows automatically as daily_build.py tags more
    // items — no code changes ever needed here.
    extractAvailableFilters() {
      const industries = new Set();
      const companies  = new Set();
      const titles     = new Set();
      const locations  = new Set();
      this.allItems.forEach(item => {
        (item.industries || []).forEach(i => industries.add(i));
        (item.companies  || []).forEach(c => companies.add(c));
        (item.job_titles || []).forEach(t => titles.add(t));
        (item.locations  || []).forEach(l => locations.add(l));
      });
      this.availableIndustries = Array.from(industries).sort();
      this.availableCompanies  = Array.from(companies).sort();
      this.availableTitles     = Array.from(titles).sort();
      this.availableLocations  = Array.from(locations).sort();
    },

    // ── TOGGLE METHODS ───────────────────────────────────────────────────────────
    // Each toggle fires GA4 + Clarity + KV on check (not uncheck — reduces noise).
    // window.trackKV is exposed globally by the cookieless IIFE below.
    // Tracking is future-proof: new filter values are tracked automatically
    // because we track the value string, not hardcoded options.

    togglePersona(persona) {
      const idx = this.selectedPersonas.indexOf(persona);
      if (idx > -1) {
        this.selectedPersonas.splice(idx, 1);
      } else {
        this.selectedPersonas.push(persona);
        if (typeof gtag !== 'undefined')
          gtag('event', 'filter_applied', { filter_type: 'persona', filter_value: persona, page_location: window.location.href });
        if (typeof window.clarity === 'function') {
          window.clarity('event', 'filter_persona');
          window.clarity('set', 'persona_filter', persona);
        }
        if (typeof window.trackKV === 'function') window.trackKV('persona_filter', persona);
      }
      this.savePreferences();
    },

    toggleIndustry(industry) {
      const idx = this.selectedIndustries.indexOf(industry);
      if (idx > -1) {
        this.selectedIndustries.splice(idx, 1);
      } else {
        this.selectedIndustries.push(industry);
        if (typeof gtag !== 'undefined')
          gtag('event', 'filter_applied', { filter_type: 'industry', filter_value: industry, page_location: window.location.href });
        if (typeof window.clarity === 'function') {
          window.clarity('event', 'filter_industry');
          window.clarity('set', 'industry_filter', industry);
        }
        if (typeof window.trackKV === 'function') window.trackKV('industry_filter', industry);
      }
      this.savePreferences();
    },

    toggleCompany(company) {
      const idx = this.selectedCompanies.indexOf(company);
      if (idx > -1) {
        this.selectedCompanies.splice(idx, 1);
      } else {
        this.selectedCompanies.push(company);
        if (typeof gtag !== 'undefined')
          gtag('event', 'filter_applied', { filter_type: 'company', filter_value: company, page_location: window.location.href });
        if (typeof window.clarity === 'function') {
          window.clarity('event', 'filter_company');
          window.clarity('set', 'company_filter', company);
        }
        if (typeof window.trackKV === 'function') window.trackKV('company_filter', company);
      }
      this.savePreferences();
    },

    toggleTitle(title) {
      const idx = this.selectedTitles.indexOf(title);
      if (idx > -1) {
        this.selectedTitles.splice(idx, 1);
      } else {
        this.selectedTitles.push(title);
        if (typeof gtag !== 'undefined')
          gtag('event', 'filter_applied', { filter_type: 'job_title', filter_value: title, page_location: window.location.href });
        if (typeof window.clarity === 'function') {
          window.clarity('event', 'filter_job_title');
          window.clarity('set', 'job_title_filter', title);
        }
        if (typeof window.trackKV === 'function') window.trackKV('job_title_filter', title);
      }
      this.savePreferences();
    },

    toggleLocation(location) {
      const idx = this.selectedLocations.indexOf(location);
      if (idx > -1) {
        this.selectedLocations.splice(idx, 1);
      } else {
        this.selectedLocations.push(location);
        if (typeof gtag !== 'undefined')
          gtag('event', 'filter_applied', { filter_type: 'location', filter_value: location, page_location: window.location.href });
        if (typeof window.clarity === 'function') {
          window.clarity('event', 'filter_location');
          window.clarity('set', 'location_filter', location);
        }
        if (typeof window.trackKV === 'function') window.trackKV('location_filter', location);
      }
      this.savePreferences();
    },

    // ── DROPDOWN CONTROL ─────────────────────────────────────────────────────────
    toggleDropdown(name) { this.openDropdown = this.openDropdown === name ? null : name; },
    closeDropdown()      { this.openDropdown = null; },

    // ── SELECT / CLEAR ALL ───────────────────────────────────────────────────────
    // Select All fires one bulk event (not one per item — would be noisy).
    // Clear All records the action in KV only (no GA4 needed).

    selectAllPersonas()   { this.selectedPersonas = [...this.personas];
      if (typeof gtag !== 'undefined') gtag('event', 'filter_select_all', { filter_type: 'persona', page_location: window.location.href });
      if (typeof window.trackKV === 'function') window.trackKV('persona_filter', 'SELECT_ALL'); this.savePreferences(); },
    clearAllPersonas()    { this.selectedPersonas = [];
      if (typeof window.trackKV === 'function') window.trackKV('persona_filter', 'CLEAR_ALL'); this.savePreferences(); },

    selectAllIndustries() { this.selectedIndustries = [...this.availableIndustries];
      if (typeof gtag !== 'undefined') gtag('event', 'filter_select_all', { filter_type: 'industry', page_location: window.location.href });
      if (typeof window.trackKV === 'function') window.trackKV('industry_filter', 'SELECT_ALL'); this.savePreferences(); },
    clearAllIndustries()  { this.selectedIndustries = [];
      if (typeof window.trackKV === 'function') window.trackKV('industry_filter', 'CLEAR_ALL'); this.savePreferences(); },

    selectAllCompanies()  { this.selectedCompanies = [...this.availableCompanies];
      if (typeof gtag !== 'undefined') gtag('event', 'filter_select_all', { filter_type: 'company', page_location: window.location.href });
      if (typeof window.trackKV === 'function') window.trackKV('company_filter', 'SELECT_ALL'); this.savePreferences(); },
    clearAllCompanies()   { this.selectedCompanies = [];
      if (typeof window.trackKV === 'function') window.trackKV('company_filter', 'CLEAR_ALL'); this.savePreferences(); },

    selectAllTitles()     { this.selectedTitles = [...this.availableTitles];
      if (typeof gtag !== 'undefined') gtag('event', 'filter_select_all', { filter_type: 'job_title', page_location: window.location.href });
      if (typeof window.trackKV === 'function') window.trackKV('job_title_filter', 'SELECT_ALL'); this.savePreferences(); },
    clearAllTitles()      { this.selectedTitles = [];
      if (typeof window.trackKV === 'function') window.trackKV('job_title_filter', 'CLEAR_ALL'); this.savePreferences(); },

    selectAllLocations()  { this.selectedLocations = [...this.availableLocations];
      if (typeof gtag !== 'undefined') gtag('event', 'filter_select_all', { filter_type: 'location', page_location: window.location.href });
      if (typeof window.trackKV === 'function') window.trackKV('location_filter', 'SELECT_ALL'); this.savePreferences(); },
    clearAllLocations()   { this.selectedLocations = [];
      if (typeof window.trackKV === 'function') window.trackKV('location_filter', 'CLEAR_ALL'); this.savePreferences(); },

    // ── FILTERED OPTIONS (DROPDOWN SEARCH) ──────────────────────────────────────
    get filteredPersonaOptions()  { return !this.dropdownSearchPersona  ? this.personas            : this.personas.filter(p            => p.toLowerCase().includes(this.dropdownSearchPersona.toLowerCase())); },
    get filteredIndustryOptions() { return !this.dropdownSearchIndustry ? this.availableIndustries : this.availableIndustries.filter(i => i.toLowerCase().includes(this.dropdownSearchIndustry.toLowerCase())); },
    get filteredCompanyOptions()  { return !this.dropdownSearchCompany  ? this.availableCompanies  : this.availableCompanies.filter(c  => c.toLowerCase().includes(this.dropdownSearchCompany.toLowerCase())); },
    get filteredTitleOptions()    { return !this.dropdownSearchTitle    ? this.availableTitles      : this.availableTitles.filter(t     => t.toLowerCase().includes(this.dropdownSearchTitle.toLowerCase())); },
    get filteredLocationOptions() { return !this.dropdownSearchLocation ? this.availableLocations  : this.availableLocations.filter(l  => l.toLowerCase().includes(this.dropdownSearchLocation.toLowerCase())); },

    // ── MAIN FILTER LOGIC ────────────────────────────────────────────────────────
    get filteredItems() {
      let results = [...this.allItems];

      // Timeframe
      const syncTime = (this.refreshedAt && this.refreshedAt !== 'Loading...' && this.refreshedAt !== 'Offline')
        ? new Date(this.refreshedAt.replace(' UTC', 'Z').replace(' ', 'T'))
        : new Date();
      const hoursBack = parseInt(this.timeframe);
      results = results.filter(item => {
        try { return ((syncTime - new Date(item.pub_date)) / 3600000) <= hoursBack; }
        catch (e) { return true; }
      });

      // Search (all fields including tag arrays)
      if (this.search) {
        const s = this.search.toLowerCase();
        results = results.filter(i =>
          (i.title    || '').toLowerCase().includes(s) ||
          (i.summary  || '').toLowerCase().includes(s) ||
          (i.source   || '').toLowerCase().includes(s) ||
          (i.persona  || '').toLowerCase().includes(s) ||
          (i.industries  || []).some(v => v.toLowerCase().includes(s)) ||
          (i.companies   || []).some(v => v.toLowerCase().includes(s)) ||
          (i.job_titles  || []).some(v => v.toLowerCase().includes(s)) ||
          (i.locations   || []).some(v => v.toLowerCase().includes(s))
        );
      }

      // Multi-select filters — all OR logic
      if (this.selectedPersonas.length   > 0) results = results.filter(i => this.selectedPersonas.some(s   => (i.persona       || '').includes(s)));
      if (this.selectedIndustries.length > 0) results = results.filter(i => this.selectedIndustries.some(s => (i.industries    || []).includes(s)));
      if (this.selectedCompanies.length  > 0) results = results.filter(i => this.selectedCompanies.some(s  => (i.companies     || []).includes(s)));
      if (this.selectedTitles.length     > 0) results = results.filter(i => this.selectedTitles.some(s     => (i.job_titles    || []).includes(s)));
      if (this.selectedLocations.length  > 0) results = results.filter(i => this.selectedLocations.some(s  => (i.locations     || []).includes(s)));

      // Sort newest first
      results.sort((a, b) => { try { return new Date(b.pub_date) - new Date(a.pub_date); } catch(e) { return 0; } });
      return results;
    },

    get activeFilterCount() {
      return this.selectedPersonas.length + this.selectedIndustries.length +
             this.selectedCompanies.length + this.selectedTitles.length + this.selectedLocations.length;
    },

    // ── UTILITY ──────────────────────────────────────────────────────────────────
    formatDate(iso) {
      if (!iso) return 'Recent';
      try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
      catch (e) { return 'Recent'; }
    },

    // trackPersona kept for backward compatibility (called by nothing now, but safe to keep)
    trackPersona(personaName) { this.savePreferences(); },

    trackTimeframe(hours) {
      this.savePreferences();
      if (typeof gtag !== 'undefined')
        gtag('event', 'timeframe_changed', { hours_selected: hours, page_location: window.location.href });
      // KV handled by setupTimeframeTracking() in IIFE — not here (prevents double-count)
    },

    // trackReset: fires when "All Signals" button is clicked
    trackReset() {
      if (typeof gtag !== 'undefined')
        gtag('event', 'filter_reset', { page_location: window.location.href });
      if (typeof window.clarity === 'function') window.clarity('event', 'filter_reset');
      if (typeof window.trackKV === 'function') window.trackKV('filter_reset', 'all');
    },

    searchTimeout: null,
    debouncedSearch() {
      clearTimeout(this.searchTimeout);
      this.searchTimeout = setTimeout(() => {
        if (this.search.length >= 3 && typeof gtag !== 'undefined')
          gtag('event', 'search_used', { search_term: this.search, page_location: window.location.href });
      }, 1000);
    },

  }
}
</script>

<script>
function acceptCookies() {
  gtag('consent', 'update', { 'analytics_storage': 'granted' });
  localStorage.setItem("cookieConsent", "accepted");
  document.getElementById("cookie-banner").style.display = "none";
}
function rejectCookies() {
  gtag('consent', 'update', { 'analytics_storage': 'denied' });
  localStorage.setItem("cookieConsent", "rejected");
  document.getElementById("cookie-banner").style.display = "none";
}
window.onload = function() {
  const consent = localStorage.getItem("cookieConsent");
  if (!consent) { document.getElementById("cookie-banner").style.display = "flex"; }
  else if (consent === "accepted") { gtag('consent', 'update', { 'analytics_storage': 'granted' }); }
};
</script>

<!-- GA4 external link click tracker -->
<script>
document.addEventListener("click", function(e) {
  const link = e.target.closest("a");
  if (!link) return;
  const href = link.getAttribute("href");
  if (!href || !href.startsWith("http")) return;
  const linkText = link.innerText.trim() || "unknown-link";
  e.preventDefault();
  gtag('event', 'external_link_click', {
    event_category: 'engagement',
    event_label: linkText,
    link_url: href,
    page_location: window.location.href,
    event_callback: function() {
      if (link.target === "_blank") { window.open(href, "_blank"); }
      else { window.location.href = href; }
    }
  });
  setTimeout(function() {
    if (link.target === "_blank") { window.open(href, "_blank"); }
    else { window.location.href = href; }
  }, 300);
});
</script>

<!-- ============================================================
     COOKIELESS CUSTOM EVENT TRACKER
     Sends to Cloudflare Worker — no cookies, no PII, all visitors

     WHAT IS TRACKED:
       page_view          — every page load
       scroll_depth       — 25/50/75/100% milestones
       timeframe_change   — timeframe selector changes
       cta_click          — Read Article / Watch Video / View Code / Read Paper
       filter_reset       — "All Signals" button clicked
       persona_filter     — individual persona checked
       industry_filter    — individual industry checked
       company_filter     — individual company checked
       job_title_filter   — individual job title checked
       location_filter    — individual location checked
       *_filter SELECT_ALL / CLEAR_ALL — bulk actions

     NOTE: persona/industry/company/job_title/location tracking fires via
     window.trackKV() called directly from Alpine toggle methods above.
     This is cleaner than MutationObserver for checkbox-based UI.
     As new filter values appear in the data, they are tracked automatically.
     ============================================================ -->
<script>
(function() {
  "use strict";

  // ── WORKER URL: auto-detects dev vs prod ─────────────────────────────────────
  const PROD_WORKER_URL = "https://aisentia-analytics.pushpendradwivedi21.workers.dev";
  const DEV_WORKER_URL  = "https://aisentia-analytics-dev.pushpendradwivedi21.workers.dev";
  const IS_DEV = !['pushpendradwivedi.github.io', 'aisentia.pages.dev', 'ai-sentia.pages.dev']
                   .includes(window.location.hostname);
  const WORKER_URL = IS_DEV ? DEV_WORKER_URL : PROD_WORKER_URL;
  
  // 🐛 DEBUG: Remove after verifying correct routing
  console.log('[AI Sentia Analytics]', {
    hostname: window.location.hostname,
    IS_DEV: IS_DEV,
    WORKER_URL: WORKER_URL,
    env: IS_DEV ? 'dev' : 'prod'
  });

  // ── CORE TRACKER ─────────────────────────────────────────────────────────────
  // no-cors: no preflight fired, wildcard CORS works fine
  // keepalive: survives page close (same benefit as sendBeacon)
  // credentials omit: fully anonymous
  function track(event, value) {
    const payload = JSON.stringify({
      event: event,
      value: String(value).slice(0, 100),
      env: IS_DEV ? "dev" : "prod"
    });
    
    // 🐛 DEBUG: Remove after verifying correct routing
    console.log('[KV Track]', event, '→', value, '| Sending to:', WORKER_URL);
    
    try {
      fetch(WORKER_URL, {
        method: "POST",
        body: payload,
        mode: "no-cors",
        credentials: "omit",
        keepalive: true
      }).catch(() => {});
    } catch(e) {}
  }

  // ── EXPOSE GLOBALLY ───────────────────────────────────────────────────────────
  // Alpine.js toggle methods call window.trackKV() for cookieless KV tracking.
  // Alpine loads before this IIFE executes, so we attach here after page load.
  window.trackKV = track;

  // ── 1. PAGE VIEW ──────────────────────────────────────────────────────────────
  track("page_view", window.location.pathname || "/");

  // ── 2. SCROLL DEPTH MILESTONES (25 / 50 / 75 / 100%) ─────────────────────────
  const firedMilestones = new Set();
  function setupScrollTracking() {
    [25, 50, 75, 100].forEach(pct => {
      const sentinel = document.createElement("div");
      sentinel.style.cssText = "position:absolute;left:0;width:1px;height:1px;pointer-events:none;";
      const setPos = () => {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
        sentinel.style.top = Math.floor((h * pct) / 100) + "px";
      };
      setPos();
      setTimeout(setPos, 2000);
      setTimeout(setPos, 5000);
      document.body.appendChild(sentinel);
      new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting && !firedMilestones.has(pct)) {
            firedMilestones.add(pct);
            track("scroll_depth", pct + "%");
          }
        });
      }, { threshold: 0 }).observe(sentinel);
    });
  }

  // ── 3. TIMEFRAME SELECTOR ─────────────────────────────────────────────────────
  // KV side — GA4 side is handled in Alpine's trackTimeframe() above
  function setupTimeframeTracking() {
    const mo = new MutationObserver(() => {
      const sel = document.querySelector('select[x-model="timeframe"]');
      if (sel) {
        mo.disconnect();
        sel.addEventListener("change", e => {
          track("timeframe_change", e.target.options[e.target.selectedIndex].text);
        });
      }
    });
    mo.observe(document.body, { childList: true, subtree: true });
  }

  // ── 4. CARD CTA CLICKS ────────────────────────────────────────────────────────
  // Cookieless complement to GA4's external_link_click — fires for ALL users
  function setupCTATracking() {
    document.addEventListener("click", e => {
      const link = e.target.closest("a[href]");
      if (!link) return;
      const cta = link.textContent.trim().toUpperCase();
      if (["READ ARTICLE", "WATCH VIDEO", "VIEW CODE", "READ PAPER"].includes(cta)) {
        try {
          const domain = new URL(link.href).hostname.replace("www.", "");
          track("cta_click", cta + " | " + domain);
        } catch { track("cta_click", cta); }
      }
    });
  }

  // ── INIT ──────────────────────────────────────────────────────────────────────
  function init() {
    setupScrollTracking();
    setupTimeframeTracking();
    setupCTATracking();
    // NOTE: persona/industry/company/job_title/location filter tracking is wired
    // directly in Alpine toggle methods via window.trackKV() — no listeners needed here.
  }

  document.readyState === "loading"
    ? document.addEventListener("DOMContentLoaded", init)
    : init();

})();
</script>

</body>
</html>
